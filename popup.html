<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KeyFlow</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0d0f14;
      --surface: #13161e;
      --surface2: #1a1e28;
      --border: #252a38;
      --border-bright: #2e3449;
      --accent: #00e5ff;
      --accent-dim: rgba(0, 229, 255, 0.12);
      --accent-glow: rgba(0, 229, 255, 0.35);
      --green: #00ff88;
      --green-dim: rgba(0, 255, 136, 0.1);
      --red: #ff4060;
      --red-dim: rgba(255, 64, 96, 0.12);
      --yellow: #ffd666;
      --text: #e2e6f0;
      --text-muted: #6b7594;
      --text-dim: #3d4461;
      --radius: 8px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 380px;
      min-height: 480px;
      background: var(--bg);
      color: var(--text);
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      overflow: hidden;
      position: relative;
    }

    /* Scanline overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,0.03) 2px,
        rgba(0,0,0,0.03) 4px
      );
      pointer-events: none;
      z-index: 100;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px 12px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .logo-icon {
      width: 28px;
      height: 28px;
      background: linear-gradient(135deg, var(--accent), #0099bb);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      box-shadow: 0 0 12px var(--accent-glow);
    }

    .logo-text {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 15px;
      color: var(--text);
      letter-spacing: 0.5px;
    }

    .logo-text span {
      color: var(--accent);
    }

    .version {
      font-size: 9px;
      color: var(--text-dim);
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    /* Focus indicator */
    .focus-bar {
      padding: 8px 16px;
      background: var(--surface2);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 10px;
    }

    .focus-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--text-dim);
      transition: all 0.3s;
      flex-shrink: 0;
    }

    .focus-dot.active {
      background: var(--green);
      box-shadow: 0 0 8px var(--green);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .focus-label {
      color: var(--text-muted);
      flex: 1;
    }

    .focus-label.active { color: var(--green); }
    .focus-label.inactive { color: var(--red); }

    .focus-hint {
      color: var(--text-dim);
      font-size: 9px;
    }

    /* Main content */
    .content {
      padding: 14px 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    /* Textarea */
    .textarea-wrapper {
      position: relative;
    }

    .textarea-label {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 6px;
      color: var(--text-muted);
      font-size: 10px;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .char-count {
      color: var(--text-dim);
      font-size: 9px;
    }
    .char-count.has-text { color: var(--accent); }

    textarea {
      width: 100%;
      height: 140px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      line-height: 1.6;
      padding: 10px 12px;
      resize: none;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      tab-size: 4;
    }

    textarea::placeholder {
      color: var(--text-dim);
    }

    textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 2px var(--accent-dim);
    }

    /* Code mode toggle */
    .code-toggle {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      cursor: pointer;
      user-select: none;
      transition: border-color 0.2s;
    }

    .code-toggle:hover { border-color: var(--border-bright); }
    .code-toggle.active { border-color: var(--accent); background: var(--accent-dim); }

    .toggle-switch {
      width: 28px;
      height: 15px;
      background: var(--border-bright);
      border-radius: 8px;
      position: relative;
      transition: background 0.2s;
      flex-shrink: 0;
    }

    .toggle-switch::after {
      content: '';
      position: absolute;
      top: 2px;
      left: 2px;
      width: 11px;
      height: 11px;
      background: var(--text-muted);
      border-radius: 50%;
      transition: transform 0.2s, background 0.2s;
    }

    .code-toggle.active .toggle-switch { background: var(--accent); }
    .code-toggle.active .toggle-switch::after { transform: translateX(13px); background: var(--bg); }

    .toggle-text {
      flex: 1;
    }

    .toggle-title {
      color: var(--text);
      font-size: 11px;
      font-weight: 500;
    }

    .toggle-desc {
      color: var(--text-muted);
      font-size: 9px;
      margin-top: 1px;
    }

    .code-toggle.active .toggle-title { color: var(--accent); }

    /* Speed control */
    .speed-section {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .speed-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 10px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .speed-value {
      font-family: 'JetBrains Mono', monospace;
      color: var(--accent);
      font-size: 11px;
      font-weight: 600;
    }

    .speed-presets {
      display: flex;
      gap: 6px;
    }

    .preset-btn {
      flex: 1;
      padding: 5px 0;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 5px;
      color: var(--text-muted);
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px;
      cursor: pointer;
      transition: all 0.15s;
      text-align: center;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .preset-btn:hover {
      border-color: var(--border-bright);
      color: var(--text);
    }

    .preset-btn.active {
      border-color: var(--accent);
      background: var(--accent-dim);
      color: var(--accent);
    }

    .speed-slider-wrap {
      position: relative;
    }

    input[type=range] {
      -webkit-appearance: none;
      width: 100%;
      height: 3px;
      background: var(--border-bright);
      border-radius: 2px;
      outline: none;
      cursor: pointer;
    }

    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: var(--accent);
      cursor: pointer;
      box-shadow: 0 0 8px var(--accent-glow);
      transition: box-shadow 0.2s;
    }

    input[type=range]::-webkit-slider-thumb:hover {
      box-shadow: 0 0 14px var(--accent-glow);
    }

    /* Progress */
    .progress-section {
      display: none;
    }

    .progress-section.visible {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .progress-header {
      display: flex;
      justify-content: space-between;
      font-size: 10px;
    }

    .progress-status {
      color: var(--accent);
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .typing-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--accent);
      animation: blink 0.8s steps(1) infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }

    .progress-counter { color: var(--text-muted); }

    .progress-bar-bg {
      height: 4px;
      background: var(--surface2);
      border-radius: 2px;
      overflow: hidden;
      border: 1px solid var(--border);
    }

    .progress-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--green));
      border-radius: 2px;
      transition: width 0.1s linear;
      box-shadow: 0 0 8px var(--accent-glow);
      width: 0%;
    }

    /* Buttons */
    .btn-row {
      display: flex;
      gap: 8px;
    }

    .btn {
      flex: 1;
      padding: 10px;
      border: 1px solid transparent;
      border-radius: var(--radius);
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.5px;
      cursor: pointer;
      transition: all 0.15s;
      text-transform: uppercase;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--accent), #0099bb);
      color: var(--bg);
      border-color: transparent;
      box-shadow: 0 2px 12px rgba(0,229,255,0.3);
    }

    .btn-primary:hover:not(:disabled) {
      box-shadow: 0 4px 20px rgba(0,229,255,0.5);
      transform: translateY(-1px);
    }

    .btn-primary:active:not(:disabled) {
      transform: translateY(0);
    }

    .btn-primary:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .btn-stop {
      background: var(--red-dim);
      color: var(--red);
      border-color: var(--red);
      display: none;
      flex: 0 0 auto;
      padding: 10px 14px;
    }

    .btn-stop:hover {
      background: rgba(255,64,96,0.25);
    }

    .btn-stop.visible { display: flex; }

    .btn-clear {
      background: var(--surface);
      color: var(--text-muted);
      border-color: var(--border);
      flex: 0 0 auto;
      padding: 10px 14px;
    }

    .btn-clear:hover {
      border-color: var(--border-bright);
      color: var(--text);
    }

    /* Status message */
    .status-msg {
      text-align: center;
      font-size: 10px;
      color: var(--text-dim);
      min-height: 14px;
      transition: color 0.3s;
    }

    .status-msg.success { color: var(--green); }
    .status-msg.error { color: var(--red); }
    .status-msg.info { color: var(--accent); }
    .status-msg.warning { color: var(--yellow); }

    /* Done animation */
    @keyframes done-flash {
      0% { opacity: 1; }
      50% { opacity: 0; }
      100% { opacity: 1; }
    }

    .done-flash { animation: done-flash 0.3s ease 3; }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">
      <div class="logo-icon">⌨</div>
      <div class="logo-text">Key<span>Flow</span></div>
    </div>
    <div class="version">v1.0.0</div>
  </div>

  <div class="focus-bar" id="focusBar">
    <div class="focus-dot" id="focusDot"></div>
    <div class="focus-label inactive" id="focusLabel">Click a text field on the page first</div>
  </div>

  <div class="content">
    <!-- Text input area -->
    <div class="textarea-wrapper">
      <div class="textarea-label">
        <span>Text to type</span>
        <span class="char-count" id="charCount">0 chars</span>
      </div>
      <textarea id="inputText" placeholder="Paste your text here — code, paragraphs, anything...&#10;&#10;All whitespace, tabs, and newlines are preserved exactly."></textarea>
    </div>

    <!-- Code mode toggle -->
    <div class="code-toggle" id="codeToggle">
      <div class="toggle-switch"></div>
      <div class="toggle-text">
        <div class="toggle-title">Code Mode</div>
        <div class="toggle-desc">Preserves tabs, indentation &amp; special characters exactly</div>
      </div>
    </div>

    <!-- Speed control -->
    <div class="speed-section">
      <div class="speed-header">
        <span>Typing Speed</span>
        <span class="speed-value" id="speedDisplay">120 WPM</span>
      </div>
      <div class="speed-presets">
        <button class="preset-btn" data-wpm="30">Slow</button>
        <button class="preset-btn active" data-wpm="120">Normal</button>
        <button class="preset-btn" data-wpm="300">Fast</button>
        <button class="preset-btn" data-wpm="600">Turbo</button>
      </div>
      <input type="range" id="speedSlider" min="10" max="1000" value="120" step="10" />
    </div>

    <!-- Progress -->
    <div class="progress-section" id="progressSection">
      <div class="progress-header">
        <div class="progress-status">
          <div class="typing-dot"></div>
          Typing...
        </div>
        <div class="progress-counter" id="progressCounter">0 / 0</div>
      </div>
      <div class="progress-bar-bg">
        <div class="progress-bar-fill" id="progressFill"></div>
      </div>
    </div>

    <!-- Buttons -->
    <div class="btn-row">
      <button class="btn btn-primary" id="startBtn" disabled>
        ▶ Start Typing
      </button>
      <button class="btn btn-stop" id="stopBtn">
        ■ Stop
      </button>
      <button class="btn btn-clear" id="clearBtn" title="Clear text">
        ✕
      </button>
    </div>

    <div class="status-msg" id="statusMsg">Click a text field in the page, then come back here</div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
